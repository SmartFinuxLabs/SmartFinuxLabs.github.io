<svg width="1600" height="1050" viewBox="0 0 1600 1050" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 18px; fill: #555; }
      .layerLabel { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #444; letter-spacing: .5px; }
      .box { fill: #fff; stroke: #222; stroke-width: 2.2; rx: 18; }
      .contract { fill: #f8f8f8; stroke: #222; stroke-width: 2.4; rx: 22; }
      .thinBox { fill: #fff; stroke: #555; stroke-width: 1.8; rx: 14; }
      .text { font-family: Inter, Arial, sans-serif; font-size: 23px; font-weight: 650; fill: #111; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #444; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 14px; fill: #555; }
      .line { fill: none; stroke: #222; stroke-width: 2.2; }
      .dash { fill: none; stroke: #333; stroke-width: 2; stroke-dasharray: 8 7; }
      .softDash { fill: none; stroke: #666; stroke-width: 1.8; stroke-dasharray: 5 7; }
      .note { fill: #fafafa; stroke: #aaa; stroke-width: 1.3; rx: 12; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#222"/>
    </marker>
    <marker id="arrowGrey" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L12,4 L0,8 Z" fill="#555"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="1050"/>

  <text x="800" y="56" text-anchor="middle" class="title">On-Chain Supply Chain Finance Architecture</text>
  <text x="800" y="87" text-anchor="middle" class="subtitle">Invoice acceptance → liquidity funding → advance payment → buyer settlement → investor repayment</text>

  <!-- Layer labels -->
  <text x="80" y="138" class="layerLabel">TOP LAYER · TRADING PARTIES</text>
  <text x="80" y="442" class="layerLabel">MIDDLE LAYER · ON-CHAIN SCF INFRASTRUCTURE</text>
  <text x="80" y="790" class="layerLabel">BOTTOM LAYER · CAPITAL PROVIDER</text>

  <!-- Top layer boxes -->
  <rect x="120" y="165" width="330" height="170" class="box"/>
  <text x="285" y="225" text-anchor="middle" class="text">Supplier</text>
  <text x="285" y="258" text-anchor="middle" class="small">SME / Vendor</text>
  <text x="285" y="292" text-anchor="middle" class="tiny">Issues invoice</text>
  <text x="285" y="316" text-anchor="middle" class="tiny">Receives advance payment</text>

  <rect x="1150" y="165" width="330" height="170" class="box"/>
  <text x="1315" y="225" text-anchor="middle" class="text">Buyer</text>
  <text x="1315" y="258" text-anchor="middle" class="small">Anchor Corp</text>
  <text x="1315" y="292" text-anchor="middle" class="tiny">Accepts debt / payable</text>
  <text x="1315" y="316" text-anchor="middle" class="tiny">Pays final amount at maturity</text>

  <!-- Middle layer contract -->
  <rect x="260" y="470" width="1080" height="215" class="contract"/>
  <text x="800" y="525" text-anchor="middle" class="text">On-Chain SCF Smart Contracts</text>
  <text x="800" y="558" text-anchor="middle" class="small">Escrow · Asset Vault · Credit Engine · Receivable Registry · Settlement Logic</text>

  <rect x="315" y="595" width="210" height="55" class="thinBox"/>
  <text x="420" y="630" text-anchor="middle" class="small">Receivable NFT / Claim</text>

  <rect x="555" y="595" width="210" height="55" class="thinBox"/>
  <text x="660" y="630" text-anchor="middle" class="small">Escrow Vault</text>

  <rect x="795" y="595" width="210" height="55" class="thinBox"/>
  <text x="900" y="630" text-anchor="middle" class="small">Credit Engine</text>

  <rect x="1035" y="595" width="250" height="55" class="thinBox"/>
  <text x="1160" y="630" text-anchor="middle" class="small">Repayment + Yield Split</text>

  <!-- Bottom layer -->
  <rect x="120" y="815" width="390" height="170" class="box"/>
  <text x="315" y="875" text-anchor="middle" class="text">Investor / Factor</text>
  <text x="315" y="908" text-anchor="middle" class="small">Liquidity Provider</text>
  <text x="315" y="942" text-anchor="middle" class="tiny">Bids on accepted receivable</text>
  <text x="315" y="966" text-anchor="middle" class="tiny">Receives principal + yield</text>

  <!-- Top interactions -->
  <path d="M450 215 C650 175, 950 175, 1150 215" class="dash" marker-end="url(#arrow)"/>
  <text x="800" y="178" text-anchor="middle" class="small">1. Invoice Issuance</text>

  <path d="M1150 282 C950 340, 650 340, 450 282" class="dash" marker-end="url(#arrow)"/>
  <text x="800" y="355" text-anchor="middle" class="small">2. Debt Acceptance / Payable Confirmation</text>

  <!-- Supplier to contract fund request -->
  <path d="M285 335 L285 455" class="line" marker-end="url(#arrow)"/>
  <text x="150" y="405" class="small">3. Fund Request</text>

  <!-- Contract to supplier advance -->
  <path d="M520 500 C470 430, 390 390, 315 335" class="softDash" marker-end="url(#arrowGrey)"/>
  <text x="415" y="410" class="small">5. Advance Payment</text>
  <text x="415" y="434" class="tiny">80–90% stablecoin / cash rail</text>

  <!-- Buyer final payment -->
  <path d="M1315 335 L1315 455" class="line" marker-end="url(#arrow)"/>
  <text x="1335" y="405" class="small">6. Final Payment</text>
  <text x="1335" y="429" class="tiny">100% at maturity</text>

  <!-- Investor bid -->
  <path d="M315 815 L315 700" class="line" marker-end="url(#arrow)"/>
  <text x="175" y="745" class="small">4. Bid / Fund Liquidity</text>

  <!-- Repayment -->
  <path d="M600 685 C555 755, 455 795, 355 815" class="softDash" marker-end="url(#arrowGrey)"/>
  <text x="505" y="755" class="small">7. Repayment + Yield</text>

  <!-- Internal contract flow -->
  <path d="M525 623 L555 623" class="line" marker-end="url(#arrow)"/>
  <path d="M765 623 L795 623" class="line" marker-end="url(#arrow)"/>
  <path d="M1005 623 L1035 623" class="line" marker-end="url(#arrow)"/>

  <!-- Notes -->
  <rect x="585" y="745" width="740" height="105" class="note"/>
  <text x="610" y="780" class="small">Architecture logic:</text>
  <text x="610" y="810" class="tiny">Accepted buyer payable becomes a financeable receivable asset.</text>
  <text x="610" y="834" class="tiny">Liquidity provider funds early payment to supplier; buyer final payment later clears the contract and repays investor.</text>
</svg>